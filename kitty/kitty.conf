font_family Hack Nerd Font Mono
font_size 9

# Route Nerd Font PUA codepoints to a dedicated icon font so glyphs
# render even if the primary font's PUA lookup fails.
symbol_map U+E000-U+F8FF,U+F0000-U+FFFFD,U+100000-U+10FFFD Symbols Nerd Font Mono

scrollback_lines 5000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

detect_urls yes
underline_hyperlinks hover

strip_trailing_spaces smart

select_by_word_characters @-./_~?&=%+#

# Theme: Gruvbox Dark Hard
background            #1d2021
foreground            #ebdbb2
cursor                #ebdbb2
selection_background  #504945
selection_foreground  #ebdbb2

# normal
color0  #282828
color1  #cc241d
color2  #98971a
color3  #d79921
color4  #458588
color5  #b16286
color6  #689d6a
color7  #a89984

# bright
color8  #928374
color9  #fb4934
